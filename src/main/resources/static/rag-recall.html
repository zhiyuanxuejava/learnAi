<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RAG 召回测试</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 28%),
        radial-gradient(circle at right 12%, rgba(16, 185, 129, 0.1), transparent 24%),
        #eef2f7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
    }

    main {
      width: min(1240px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .headline {
      max-width: 780px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      font-weight: 780;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0;
      color: #475569;
      font-size: 14px;
      line-height: 1.7;
    }

    .status {
      min-width: 96px;
      padding: 7px 12px;
      border: 1px solid #c8d3e2;
      border-radius: 999px;
      color: #475569;
      background: rgba(255, 255, 255, 0.92);
      font-size: 13px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .panel {
      border: 1px solid #cbd7e6;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(8px);
    }

    .controls {
      padding: 18px;
      margin-bottom: 18px;
    }

    form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 120px 120px auto auto;
      gap: 10px;
      align-items: center;
    }

    input,
    button {
      height: 46px;
      border-radius: 10px;
      font-size: 15px;
    }

    input {
      width: 100%;
      min-width: 0;
      padding: 0 14px;
      border: 1px solid #bfcbda;
      outline: none;
      background: #ffffff;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
    }

    button {
      min-width: 76px;
      padding: 0 16px;
      border: 0;
      font-weight: 680;
      cursor: pointer;
    }

    button[type="submit"] {
      color: #ffffff;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
    }

    button[type="button"] {
      color: #334155;
      background: #dbe4ef;
    }

    .tips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .chip {
      padding: 6px 10px;
      border: 1px solid #d7e0ec;
      border-radius: 999px;
      color: #475569;
      background: #f8fafc;
      font-size: 12px;
      cursor: pointer;
      user-select: none;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-card {
      padding: 16px 18px;
    }

    .summary-label {
      margin-bottom: 8px;
      color: #64748b;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .summary-value {
      color: #0f172a;
      font-size: 26px;
      font-weight: 760;
      line-height: 1.1;
    }

    .summary-note {
      margin-top: 8px;
      color: #64748b;
      font-size: 13px;
    }

    .result-shell {
      overflow: hidden;
    }

    .result-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 50px;
      padding: 0 18px;
      border-bottom: 1px solid #e2e8f0;
      color: #64748b;
      background: #f8fafc;
      font-size: 13px;
    }

    .result-body {
      padding: 18px;
    }

    .empty-state {
      padding: 48px 20px;
      color: #94a3b8;
      text-align: center;
      font-size: 15px;
      line-height: 1.7;
    }

    .hit-list {
      display: grid;
      gap: 16px;
    }

    .hit-card {
      padding: 18px;
      border: 1px solid #d7e0ec;
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(248, 250, 252, 0.95), rgba(255, 255, 255, 0.95));
    }

    .hit-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .hit-title {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 34px;
      padding: 0 10px;
      border-radius: 999px;
      color: #ffffff;
      background: linear-gradient(135deg, #0f172a, #334155);
      font-size: 13px;
      font-weight: 760;
    }

    .file-name {
      color: #0f172a;
      font-size: 18px;
      font-weight: 720;
      line-height: 1.3;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .meta-pill {
      padding: 6px 10px;
      border-radius: 999px;
      color: #334155;
      background: #eff6ff;
      font-size: 12px;
      font-weight: 600;
    }

    .snippet {
      margin: 0;
      padding: 16px;
      border-radius: 12px;
      color: #1e293b;
      background: #f8fafc;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .context-blocks {
      display: grid;
      gap: 10px;
    }

    .context-item {
      padding: 14px 16px;
      border: 1px solid #d7e0ec;
      border-radius: 12px;
      background: #ffffff;
    }

    .context-item.active {
      border-color: #93c5fd;
      background: #eff6ff;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.08);
    }

    .context-label {
      margin-bottom: 8px;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .context-text {
      margin: 0;
      color: #1e293b;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    details {
      margin-top: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #ffffff;
      overflow: hidden;
    }

    summary {
      padding: 12px 14px;
      cursor: pointer;
      color: #475569;
      font-size: 13px;
      font-weight: 680;
      user-select: none;
    }

    .metadata-json {
      margin: 0;
      padding: 0 14px 14px;
      overflow: auto;
      color: #0f172a;
      font-size: 13px;
      line-height: 1.7;
      font-family: "JetBrains Mono", Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .error-banner {
      display: none;
      margin-bottom: 18px;
      padding: 14px 16px;
      border: 1px solid #fecaca;
      border-radius: 12px;
      color: #991b1b;
      background: #fef2f2;
      font-size: 14px;
      line-height: 1.6;
    }

    .error-banner.visible {
      display: block;
    }

    @media (max-width: 860px) {
      main {
        width: calc(100% - 24px);
        padding: 18px 0 28px;
      }

      header,
      form,
      .summary {
        grid-template-columns: 1fr;
      }

      header {
        flex-direction: column;
        align-items: stretch;
      }

      form {
        display: grid;
      }

      .summary {
        display: grid;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
<main>
  <header>
    <div class="headline">
      <h1>RAG 召回测试台</h1>
      <p class="subtitle">输入问题后直接查看向量检索召回结果，包括命中文档、分数、来源文件、分块序号和原始 metadata，方便你直观评估召回效果。</p>
    </div>
    <div id="status" class="status">待查询</div>
  </header>

  <div id="errorBanner" class="error-banner" role="alert"></div>

  <section class="panel controls" aria-label="召回测试参数">
    <form id="recallForm">
      <input id="query" name="query" autocomplete="off" placeholder="例如：java1234 主要面向哪些用户？" aria-label="查询内容">
      <input id="topK" name="topK" type="number" min="1" max="20" value="5" aria-label="召回数量">
      <input id="storeName" value="RedisVectorStore" readonly aria-label="向量存储">
      <button id="submitButton" type="submit">开始测试</button>
      <button id="clearButton" type="button">清空</button>
    </form>
    <div class="tips" aria-label="示例问题">
      <span class="chip" data-query="java1234 主要面向哪些用户？">java1234 主要面向哪些用户？</span>
      <span class="chip" data-query="Spring AI 实战栏目保存在哪个文件中？">Spring AI 实战栏目保存在哪个文件中？</span>
      <span class="chip" data-query="项目使用了哪些技术栈？">项目使用了哪些技术栈？</span>
      <span class="chip" data-query="RAG 测试文档里提到了哪些 AI 相关能力？">RAG 测试文档里提到了哪些 AI 相关能力？</span>
    </div>
  </section>

  <section class="summary" aria-label="召回概览">
    <div class="panel summary-card">
      <div class="summary-label">命中数量</div>
      <div id="hitCount" class="summary-value">0</div>
      <div class="summary-note">当前返回的召回结果数量</div>
    </div>
    <div class="panel summary-card">
      <div class="summary-label">耗时</div>
      <div id="durationMs" class="summary-value">0 ms</div>
      <div class="summary-note">接口响应总耗时</div>
    </div>
    <div class="panel summary-card">
      <div class="summary-label">最高分</div>
      <div id="topScore" class="summary-value">-</div>
      <div class="summary-note">按 score 排序后的第一条结果</div>
    </div>
    <div class="panel summary-card">
      <div class="summary-label">查询内容</div>
      <div id="queryPreview" class="summary-value" style="font-size: 16px; line-height: 1.5;">-</div>
      <div class="summary-note">本次检索使用的 query</div>
    </div>
  </section>

  <section class="panel result-shell" aria-label="召回结果">
    <div class="result-toolbar">
      <span>命中文档列表</span>
      <span id="toolbarHint">可展开查看 metadata</span>
    </div>
    <div id="resultBody" class="result-body">
      <div class="empty-state">输入查询内容后点击“开始测试”，这里会展示 RAG 召回的命中文档。</div>
    </div>
  </section>
</main>

<script>
  const form = document.querySelector("#recallForm");
  const queryInput = document.querySelector("#query");
  const topKInput = document.querySelector("#topK");
  const submitButton = document.querySelector("#submitButton");
  const clearButton = document.querySelector("#clearButton");
  const statusText = document.querySelector("#status");
  const errorBanner = document.querySelector("#errorBanner");
  const resultBody = document.querySelector("#resultBody");
  const hitCount = document.querySelector("#hitCount");
  const durationMs = document.querySelector("#durationMs");
  const topScore = document.querySelector("#topScore");
  const queryPreview = document.querySelector("#queryPreview");
  const chips = Array.from(document.querySelectorAll(".chip"));
  const savedQuery = localStorage.getItem("rag-recall-query");
  const savedTopK = localStorage.getItem("rag-recall-topk");

  if (savedQuery) {
    queryInput.value = savedQuery;
  }
  if (savedTopK) {
    topKInput.value = savedTopK;
  }

  chips.forEach(chip => {
    chip.addEventListener("click", () => {
      queryInput.value = chip.dataset.query || "";
      queryInput.focus();
    });
  });

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    await searchRecall();
  });

  clearButton.addEventListener("click", () => {
    queryInput.value = "";
    topKInput.value = "5";
    localStorage.removeItem("rag-recall-query");
    localStorage.removeItem("rag-recall-topk");
    errorBanner.classList.remove("visible");
    errorBanner.textContent = "";
    statusText.textContent = "待查询";
    hitCount.textContent = "0";
    durationMs.textContent = "0 ms";
    topScore.textContent = "-";
    queryPreview.textContent = "-";
    resultBody.innerHTML = '<div class="empty-state">输入查询内容后点击“开始测试”，这里会展示 RAG 召回的命中文档。</div>';
  });

  async function searchRecall() {
    const query = queryInput.value.trim();
    const topK = normalizeTopK(topKInput.value);

    if (!query) {
      showError("查询内容不能为空");
      queryInput.focus();
      return;
    }

    localStorage.setItem("rag-recall-query", query);
    localStorage.setItem("rag-recall-topk", String(topK));
    topKInput.value = String(topK);

    setLoading(true);
    hideError();

    try {
      const response = await fetch(`/rag/recall?query=${encodeURIComponent(query)}&topK=${topK}`);
      const payload = await response.json();

      if (!response.ok) {
        throw new Error(payload.message || "召回测试失败");
      }

      renderResult(payload);
      statusText.textContent = payload.hitCount > 0 ? "已完成" : "无命中";
    } catch (error) {
      showError(error.message || "召回测试失败");
      statusText.textContent = "失败";
    } finally {
      setLoading(false);
    }
  }

  function renderResult(payload) {
    hitCount.textContent = String(payload.hitCount ?? 0);
    durationMs.textContent = `${payload.durationMs ?? 0} ms`;
    topScore.textContent = payload.hits?.length ? formatNumber(payload.hits[0].score) : "-";
    queryPreview.textContent = payload.query || "-";

    if (!payload.hits || payload.hits.length === 0) {
      resultBody.innerHTML = '<div class="empty-state">没有召回到结果，可以换一个问题，或者先重新导入测试文档。</div>';
      return;
    }

    resultBody.innerHTML = `
      <div class="hit-list">
        ${payload.hits.map(renderHitCard).join("")}
      </div>
    `;
  }

  function renderHitCard(hit) {
    const metaPills = [
      hit.score != null ? `score ${formatNumber(hit.score)}` : null,
      hit.vectorScore != null ? `vector_score ${formatNumber(hit.vectorScore)}` : null,
      hit.distance != null ? `distance ${formatNumber(hit.distance)}` : null,
      hit.chunkIndex != null ? `chunk ${hit.chunkIndex}` : null,
      hit.label ? `label ${escapeHtml(hit.label)}` : null
    ].filter(Boolean).map(item => `<span class="meta-pill">${item}</span>`).join("");

    const title = escapeHtml(hit.fileName || hit.label || hit.documentId || hit.chunkDocumentId || "未命名文档");
    const source = hit.source ? `<span class="meta-pill">source ${escapeHtml(hit.source)}</span>` : "";
    const snippet = renderContextBlocks(hit);
    const metadataJson = escapeHtml(JSON.stringify(hit.metadata || {}, null, 2));

    return `
      <article class="hit-card">
        <div class="hit-head">
          <div class="hit-title">
            <span class="rank-badge">#${hit.rank}</span>
            <div class="file-name">${title}</div>
          </div>
        </div>
        <div class="meta-row">
          ${metaPills}
          ${source}
        </div>
        ${snippet}
        <details>
          <summary>查看 metadata 与文档 ID</summary>
          <pre class="metadata-json">${metadataJson}\n\ndocumentId: ${escapeHtml(hit.documentId || "")}\nchunkDocumentId: ${escapeHtml(hit.chunkDocumentId || "")}</pre>
        </details>
      </article>
    `;
  }

  function normalizeTopK(value) {
    const parsed = Number.parseInt(value, 10);
    if (Number.isNaN(parsed)) {
      return 5;
    }
    return Math.max(1, Math.min(parsed, 20));
  }

  function formatNumber(value) {
    return Number(value).toFixed(4);
  }

  function renderContextBlocks(hit) {
    const blocks = [];

    if (hit.previousContent) {
      blocks.push(renderContextItem("前一块", hit.previousContent, false));
    }

    blocks.push(renderContextItem("命中块", hit.content || hit.displayContent || "", true));

    if (hit.nextContent) {
      blocks.push(renderContextItem("后一块", hit.nextContent, false));
    }

    if (!blocks.length) {
      return `<pre class="snippet"></pre>`;
    }

    return `<div class="context-blocks">${blocks.join("")}</div>`;
  }

  function renderContextItem(label, text, active) {
    const className = active ? "context-item active" : "context-item";
    return `
      <section class="${className}">
        <div class="context-label">${escapeHtml(label)}</div>
        <pre class="context-text">${escapeHtml(text || "")}</pre>
      </section>
    `;
  }

  function setLoading(loading) {
    submitButton.disabled = loading;
    clearButton.disabled = loading;
    statusText.textContent = loading ? "查询中" : statusText.textContent;
  }

  function showError(message) {
    errorBanner.textContent = message;
    errorBanner.classList.add("visible");
  }

  function hideError() {
    errorBanner.textContent = "";
    errorBanner.classList.remove("visible");
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }
</script>
</body>
</html>
